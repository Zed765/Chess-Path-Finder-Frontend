services:
  - type: web
    name: chess-pathfinder-engine
    runtime: node
    plan: free
    buildCommand: g++ -std=c++17 -O2 engine/engine.cpp -o backend/engine
    startCommand: node backend/server.mjs
    envVars:
      - key: ENGINE_MAX_NODES
        value: 2000000
      - key: ENGINE_TIMEOUT_MS
        value: 250000
      - key: FRONTEND_ORIGIN
        sync: false
    
